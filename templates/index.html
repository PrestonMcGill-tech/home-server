<!DOCTYPE html>
<html>
<head>
    <title>Home Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🏠 Home Server</span>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Weather Station</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-header">Temperature</div>
                    <div class="card-body">
                        <h1 class="card-title">{{ reading.temperature }}°C</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-header">Humidity</div>
                    <div class="card-body">
                        <h1 class="card-title">{{ reading.humidity }}%</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-secondary mb-3">
                    <div class="card-header">Last Updated</div>
                    <div class="card-body">
                        <h5 class="card-title">{{ reading.timestamp }}</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
