<!DOCTYPE html>
<html>
<head>
    <title>Home Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🏠 Home Server</span>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Weather Station</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-header">Temperature</div>
                    <div class="card-body">
			    <h1 class="card-title" id="temperature">{{ reading.temperature }}°C</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-header">Humidity</div>
                    <div class="card-body">
                        <h1 class="card-title" id="humidity">{{ reading.humidity }}%</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-secondary mb-3">
                    <div class="card-header">Last Updated</div>
                    <div class="card-body">
                        <h5 class="card-title" id="timestamp">{{ reading.timestamp }}</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header">Temperature & Humidity History</div>
            <div class="card-body">
                <canvas id="weatherChart"></canvas>
            </div>
        </div>
    </div>
</div>
<script>
function updateReadings() { 
    fetch('/api/weather')
    .then(response => response.json())
    .then(data => { 
    	document.getElementById('temperature').textContent = data.temperature + '°C'; 
	document.getElementById('humidity').textContent = data.humidity + '%';
	document.getElementById('timestamp').textContent = data.timestamp;
    });
}
setInterval(updateReadings, 5000);
updateReadings();


let weatherChart = null;
function updateChart() {
    fetch('/api/weather/history')
        .then(response => response.json())
        .then(data => {
            const labels = data.map(r => r.timestamp);
            const temps = data.map(r => r.temperature);
            const humidity = data.map(r => r.humidity);

            if (weatherChart) {
                weatherChart.destroy();
            }

            const ctx = document.getElementById('weatherChart').getContext('2d');
            weatherChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperature (°C)',
                            data: temps,
                            borderColor: 'rgb(220, 53, 69)',
                            tension: 0.1
                        },
                        {
                            label: 'Humidity (%)',
                            data: humidity,
                            borderColor: 'rgb(13, 110, 253)',
                            tension: 0.1
                        }
                    ]
                }
            });
        });
}

updateChart();
setInterval(updateChart, 30000);





</script>
</body>
</html>
